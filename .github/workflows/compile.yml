name: Compile C++ program

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Visual Studio paths
        run: |
            $vsInstallerDirs = @(
                (Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer")
                (Join-Path ${env:ProgramFiles} "Microsoft Visual Studio\Installer")
            )
            $vswherePath = $null
            foreach ($dir in $vsInstallerDirs) {
                $candidate = Join-Path $dir "vswhere.exe"
                if (Test-Path $candidate) {
                    $vswherePath = $candidate
                    break
                }
            }
            if (-not $vswherePath) {
                $vswhereCommand = Get-Command vswhere -ErrorAction SilentlyContinue
                if ($vswhereCommand) {
                    $vswherePath = $vswhereCommand.Source
                }
            }
            if (-not $vswherePath) {
                throw "vswhere.exe was not found"
            }

            $vsInstallerPath = $null
            foreach ($dir in $vsInstallerDirs) {
                $candidate = Join-Path $dir "vs_installer.exe"
                if (Test-Path $candidate) {
                    $vsInstallerPath = $candidate
                    break
                }
            }
            if (-not $vsInstallerPath) {
                $dir = Split-Path -Parent $vswherePath
                $candidate = Join-Path $dir "vs_installer.exe"
                if (Test-Path $candidate) {
                    $vsInstallerPath = $candidate
                }
            }
            if (-not $vsInstallerPath) {
                throw "vs_installer.exe was not found"
            }

            $vsInstallationPath = & $vswherePath -latest -products *                   `
                                                 -requires Microsoft.Component.MSBuild `
                                                 -property installationPath
            if (-not $vsInstallationPath) {
                throw "Visual Studio installation was not found by vswhere"
            }
            $msbuildPath = Join-Path $vsInstallationPath "MSBuild\Current\Bin\amd64\MSBuild.exe"
            if (-not (Test-Path $msbuildPath)) {
                throw "MSBuild.exe was not found at: $msbuildPath"
            }

            "VSWHERE_PATH=$vswherePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "VS_INSTALLER_PATH=$vsInstallerPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "VS_INSTALLATION_PATH=$vsInstallationPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "MSBUILD_PATH=$msbuildPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

            Write-Host "vswhere path: $vswherePath"
            Write-Host "Visual Studio installer path: $vsInstallerPath"
            Write-Host "Visual Studio installation path: $vsInstallationPath"
            Write-Host "MSBuild path: $msbuildPath"

      - name: Install Visual Studio components
        run: |
            $components= @(
                "Microsoft.VisualStudio.Component.VC.v141.x86.x64"
                "Microsoft.VisualStudio.Component.WinXP"
            )
            $arguments = @("modify", "--installPath", $env:VS_INSTALLATION_PATH)
            foreach ($component in $components) (
                $arguments += @("--add", $component)
            )
            $arguments += @("--quiet", "--norestart", "--nocache")
            $process = Start-Process -FilePath $env:VS_INSTALLER_PATH -ArgumentList $arguments `
                                     -Wait -PassThru -NoNewWindow
            if ($process.ExitCode -eq 0 -or $process.ExitCode -eq 3010) {
                Write-Host "Visual Studio components have been successfully added."
            } else {
                Write-Host "Visual Studio components were not installed. Exit code: $($process.ExitCode)"
                exit 1
            }

      - name: Compile C++ program
        run: |
            & $env:MSBUILD_PATH EmptyConsoleProject\EmptyConsoleProject.sln       `
              /p:Configuration=Release /p:Platform=x86 /p:PlatformToolset=v141_xp

      - name: Run C++ program
        run: |
            .\EmptyConsoleProject\Release\EmptyConsoleProject.exe


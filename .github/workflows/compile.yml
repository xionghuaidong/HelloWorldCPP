      - name: Install Visual Studio components
        run: |
            Set-Location "C:\Program Files (x86)\Microsoft Visual Studio\Installer\"
            $InstallPath = "C:\Program Files\Microsoft Visual Studio\18\Enterprise"
            $componentsToAdd = @(
                  "Microsoft.VisualStudio.Component.VC.v141.x86.x64"
                  "Microsoft.VisualStudio.Component.WinXP"
            )
            [string]$workloadArgs = $componentsToAdd | ForEach-Object {" --add " +  $_}
            $Arguments = ('/c', "vs_installer.exe", 'modify', '--installPath', "`"$InstallPath`"",$workloadArgs, '--quiet', '--norestart', '--nocache')
            $process = Start-Process -FilePath cmd.exe -ArgumentList $Arguments -Wait -PassThru -WindowStyle Hidden
            if ($process.ExitCode -eq 0)
            {
                Write-Host "components have been successfully added"
            }
            else
            {
                Write-Host "components were not installed"
                exit 1
            }

      - name: MSBuild for XP
        run: |
          & "C:\Program Files\Microsoft Visual Studio\18\Enterprise\MSBuild\Current\Bin\amd64\MSBuild.exe" EmptyConsoleProject\EmptyConsoleProject.sln /p:Configuration=Release /p:Platform=x86 /p:PlatformToolset=v141_xp

      - name: Run C++ Program
        run: |
          .\EmptyConsoleProject\Release\EmptyConsoleProject.exe


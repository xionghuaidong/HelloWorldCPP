name: Compile C++ program

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install MSVC6
        shell: pwsh
        run: |
            $sevenZipPath = $null
            $candidate = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
            if (Test-Path $candidate) {
                $sevenZipPath = $candidate
            }
            if (-not $sevenZipPath) {
                $sevenZip = Get-Command 7z.exe -ErrorAction SilentlyContinue
                if ($sevenZip) {
                    $sevenZipPath = $sevenZip.Source
                }
            }
            if (-not $sevenZipPath) {
                throw "7z.exe was not found"
            }
            $packageUrlPrefix = "https://raw.githubusercontent.com/xionghuaidong/tools/refs/heads/main"
            $packageUrl = "$packageUrlPrefix/vs/windows/vc6/MSVC6.7z"
            $packagePath = Join-Path $env:GITHUB_WORKSPACE MSVC6.7z
            Invoke-WebRequest -Uri $packageUrl -OutFile $packagePath
            Push-Location ${env:ProgramFiles(x86)}
            try {
                & $sevenZipPath a x $packagePath
                if ($LASTEXITCODE -ne 0) {
                    throw "7z failed with exit code: $LASTEXITCODE"
                }
            }
            finally {
                Pop-Location
                Remove-Item $packagePath
            }
            $msvc6DirPath = Join-Path ${env:ProgramFiles(x86)} MSVC6
            $msvc6VarsPath = Join-Path $msvc6DirPath "VC98\Bin\VCVARS32.BAT"
            $msvc6Path = Join-Path $msvc6DirPath "VC98\Bin\CL.EXE"
            "MSVC6_DIR_PATH=$msvc6DirPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "MSVC6_VARS_PATH=$msvc6VarsPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "MSVC6_PATH=$msvc6Path" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Compile C++ program
        shell: cmd
        run: |
            @call %MSVC6_VARS_PATH%
            cl /nologo /EHsc /MD /O1 src\hello.cpp

      - name: Set package metadata
        shell: pwsh
        run: |
            if ($env:GITHUB_REF -like "refs/tags/v*") {
                $packageVersion = $env:GITHUB_REF_NAME.Substring(1)
            }
            else {
                $packageVersion = $env:GITHUB_SHA.Substring(0, 8)
            }
            $packageName = "hello-$packageVersion-windows-x86"
            "PACKAGE_NAME=$packageName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Package binary
        shell: pwsh
        run: |
            $sevenZipPath = $null
            $candidate = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
            if (Test-Path $candidate) {
                $sevenZipPath = $candidate
            }
            if (-not $sevenZipPath) {
                $sevenZip = Get-Command 7z.exe -ErrorAction SilentlyContinue
                if ($sevenZip) {
                    $sevenZipPath = $sevenZip.Source
                }
            }
            if (-not $sevenZipPath) {
                throw "7z.exe was not found"
            }
            $packagePath = Join-Path $env:GITHUB_WORKSPACE "$env:PACKAGE_NAME.7z"
            & $sevenZipPath a -mx=9 $packagePath hello.exe
            if ($LASTEXITCODE -ne 0) {
                throw "7z failed with exit code: $LASTEXITCODE"
            }

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
            name: "${{ env.PACKAGE_NAME }}"
            path: "${{ env.PACKAGE_NAME }}.7z"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
            gh release create                          `
                "$env:GITHUB_REF_NAME"                 `
                "$env:PACKAGE_NAME.7z"                 `
                --title "$env:GITHUB_REF_NAME"         `
                --notes "Release $env:GITHUB_REF_NAME"

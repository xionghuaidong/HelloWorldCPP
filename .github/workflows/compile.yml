name: Compile C++ program

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile C++ program
        run: |
          g++ src/main.cpp -o hello

      - name: Set package metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == "refs/tags/v*" ]]
          then
            PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
          else
            PACKAGE_VERSION="${GITHUB_SHA::8}"
          fi
          PACKAGE_NAME="hello-${VERSION}-linux-x64.tar.gz"
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "${GITHUB_ENV}"
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "${GITHUB_ENV}"

      - name: Package binary
        run: |
          tar -czf "${PACKAGE_NAME}" hello

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: hello-binary-${{ env.PACKAGE_VERSION }}
          path: ${{ env.PACKAGE_NAME }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create                      \
            "${GITHUB_REF_NAME}"                 \
            "${PACKAGE_NAME}"                    \
            --title "${GITHUB_REF_NAME}"         \
            --notes "Release ${GITHUB_REF_NAME}"
